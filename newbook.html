<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./style/newbook.css">
</head>

<body>

    <nav class="navbar  navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"> <img src="./img/duck.png" alt="Logo papera" width="40" height="40"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Catalogo libri</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Anagrafica Utenti</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link" href="#">Storico Prestiti</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" aria-disabled="true">Help</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Cerca..." aria-label="Search" />
                    <button class="btn btn-outline-white" type="submit">Cerca</button>
                </form>
            </div>
        </div>
    </nav>
    <main class="m-3">


        <form>

            <div class="container">
                <div class="row">
                    <div class="col">
                        <h1>Nuovi Libri</h1>
                    </div>
                    <div class="row">
                        <div class="col col-6 mb-3">
                            <label for="Name" class="form-label ps-2">Nome Autore</label>
                            <input type="text" class="form-control" id="Name" placeholder="Nome Autore" required>
                        </div>
                        <div class="col col-6 mb-3">
                            <label for="Surname" class="form-label ps-2">Cognome Autore</label>
                            <input type="text" class="form-control" id="Surname" placeholder="Cognome Autore" required>
                        </div>
                    </div>

                    <div class="col col-12 mb-3">
                        <label for="Title" class="form-label ps-2">Titolo</label>
                        <input type="text" class="form-control" id="Title" placeholder="Inserisci il titolo del libro" required>
                        <div id="titolo-it" class="form-text">Titolo versione italiana</div>
                    </div>

                    <div class="col col-12 col-lg-4 mb-3">
                        <label for="genre" class="form-label ps-2">Genere</label>
                        <select class="form-select" id="genre" required>
                            <option selected disabled>Scegli un genere</option>
                            <option vale="0">Giallo</option>
                            <option value="1">Fantasy</option>
                            <option value="2">Horror</option>
                            <option value="3">Romantico</option>
                            <option value="3">Fantascienza</option>
                            <option value="3">Biografico</option>
                        </select>
                    </div>
                    <div class="col col-12 col-lg-4 mb-3">
                        <label for="year" class="form-label ps-2">Anno di Pubblicazione</label>
                        <input type="data" min="01/01/1800" class="form-control" id="year"
                            placeholder="Inserisci l'anno di pubblicazione" required>
                    </div>
                    <div class="col col-12 col-lg-4 mb-5">
                        <label for="ISBN" class="form-label ps-2">ISBN#</label>
                        <input type="text" class="form-control" id="ISBN" placeholder="inserisci il codice #ISBN" required>
                    </div>

                    <hr>
                    <div class="col col-12">
                        <label class="ps-2" for="floatingTextarea2">Note</label>
                        <div class="form-floating">
                            <textarea class="form-control" placeholder="Inserisci eventuali note sul libro"
                                id="floatingTextarea2" style="height: 100px"></textarea>
                        </div>
                    </div>
                    <div class="col form-check m-3">                        
                        <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
                        <label class="form-check-label" for="checkChecked">Disponibile anche in digitale</label>
                    </div>

                    <div class="col col-12">
                        <button type="submit" class="btn btn-primary">Aggiungi Libro</button>
                    </div>
                </div>
            </div>
        </form>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>

</body>

</html>
